# YAML schema for GitHub Actions:
# https://help.github.com/en/actions/automating-your-workflow-with-github-actions/workflow-syntax-for-github-actions
#
# Helpful YAML parser to clarify YAML syntax:
# https://yaml-online-parser.appspot.com/

name: Cortex-M on Arm Virtual Hardware

# https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions#onschedule
on:
  schedule:
    - cron: '0 4 * * *'

  # Allow manually triggering of the workflow.
  workflow_dispatch: {}

jobs:
  cortex_m_generic:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.repository == 'tensorflow/tflite-micro')

    name: Cortex-M Generic
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install AVH Client for Python
        run: |
          pip install git+https://github.com/ARM-software/avhclient.git@v0.1.10

      - name: Directory structure before checkout
        run: |
          tree -L 7

      - name: Checkout vcpkg-configuration file
        uses: actions/checkout@v4
        with:
          repository: Arm-Examples/mlek-cmsis-pack-examples
          sparse-checkout: |
              main/.ci/

      - name: Directory structure after checkout
        run: |
          tree -L 7

      - name: Install tools
        uses: ARM-software/cmsis-actions/vcpkg@v1
        with: 
          config: "tflite-micro/ci/vcpkg-configuration.json"

  cortex_m_corstone_300:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.repository == 'tensorflow/tflite-micro')
    name: Cortex-M Corstone 300 (FVP)
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install AVH Client for Python
        run: |
          pip install git+https://github.com/ARM-software/avhclient.git@v0.1.10

      - name: Directory structure before checkout
        run: |
          tree -L 7

      - name: Checkout vcpkg-configuration file
        uses: actions/checkout@v4
        with:
          repository: Arm-Examples/mlek-cmsis-pack-examples
          sparse-checkout: |
            main/.ci/vcpkg-configuration.json
          path: tflite-micro/ci/

      - name: Directory structure after checkout
        run: |
          tree -L 7

      - name: Install tools
        uses: ARM-software/cmsis-actions/vcpkg@v1
        with: 
          config: "tflite-micro/ci/vcpkg-configuration.json"
